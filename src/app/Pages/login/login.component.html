<body>
    <div id="login">
        <div class="container">
            <div class="row justify-content-center align-items-center">
                <div class="col-md-6 mt-5">
                    <a class="container-fluid bg-info btn btn-outline-info my-4 mr-sm-2 my-sm-0 text-white disabled" href=""><h3>Fillory</h3></a>
                </div>
            </div>
        </div>
        <div class="container">
            <div id="login-row" class="row justify-content-center align-items-center">
                <div id="login-column" class="col-md-6">
                    <div id="login-box" class="col-md-12">
                        <form id="login-form" class="form" action="" method="post">
                            <h4 class="text-center text-info">Login</h4>
                            <div class="form-group">
                                <label for="username" class="text-info">Username:</label><br>
                                <input type="text" name="username" id="username" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="password" class="text-info">Password:</label><br>
                                <input type="password" name="password" id="password" class="form-control">
                            </div>
                            <div class="container-fluid text-center">
                                <button type="button" name="submit" class="btn btn-info btn-lg btn-block">Submit</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
